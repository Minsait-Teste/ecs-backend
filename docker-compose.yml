version: "3.9"

services:
  db:
    image: postgres:15
    container_name: aws-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aws-network
    restart: always
  
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aws-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: appdb
    depends_on:
      - db
    networks:
      - aws-network
    restart: always

networks:
  aws-network:
    driver: bridge

volumes:
  postgres_data:
