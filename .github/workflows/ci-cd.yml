      # - name: Upload Release Artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: release-artifact
      #     path: .

      - name: Run SonarQube analysis
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=Minsait-Teste_ecs-backend \
            -Dsonar.organization=minsait-teste \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.sources=src \
            -Dsonar.tests=src/tests \
            -Dsonar.exclusions=**/*.test.ts \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}  

  ## Blocks pipeline if did not pass quality gate. Activate only for production
      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: Minsait-Teste_desafio-minsait


